<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Test · Cube au sol</title>
</head>
<body style="margin:0;background:#000;font-family:sans-serif">

<!-- UI par-dessus la RA -->
<div id="ui" style="position:fixed;top:0;left:0;right:0;z-index:999;pointer-events:none">
  <div style="background:rgba(0,0,0,.6);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px">
    <strong style="font-size:.9rem">AR Test · v1.0</strong>
    <span id="status" style="font-size:.75rem;color:#fbbf24">Chargement…</span>
  </div>
  <div style="text-align:center;margin-top:8px">
    <div id="reticle" style="display:inline-block;width:50px;height:50px;border:2px solid rgba(255,255,255,.6);border-radius:50%;position:relative;top:calc(50vh - 80px)">
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.7);font-size:1.2rem">+</div>
    </div>
  </div>
</div>

<div id="hint" style="position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);color:#fff;padding:8px 18px;border-radius:20px;font-size:.78rem;z-index:999;text-align:center;white-space:nowrap">
  Pointez vers une surface et tapez pour poser le cube
</div>

<button id="placeBtn" onclick="placeObject()" style="position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:14px 40px;border-radius:30px;background:#2563eb;color:#fff;border:none;font-size:1rem;font-weight:700;z-index:999;box-shadow:0 4px 20px rgba(37,99,235,.5);display:none">
  📍 Poser le cube ici
</button>

<button id="resetBtn" onclick="resetObject()" style="position:fixed;bottom:30px;right:16px;padding:10px 18px;border-radius:20px;background:rgba(0,0,0,.5);color:#fff;border:1px solid rgba(255,255,255,.3);font-size:.78rem;font-weight:700;z-index:999;display:none">
  ↺ Réinitialiser
</button>

<script>
// ═══════════════════════════
//  WebXR Hit-Test AR
//  Mode le plus simple :
//  1. Demande session AR
//  2. Hit-test sur le sol
//  3. Tap = pose un cube
// ═══════════════════════════

let xrSession = null;
let xrRefSpace = null;
let hitTestSource = null;
let gl = null;
let canvas = null;

// Objet 3D posé
let placed = false;
let placedMatrix = null;

// Rotation de l'objet pour le rendu
let objectRotY = 0;

function setStatus(txt, col='#fbbf24') {
  const s = document.getElementById('status');
  s.textContent = txt;
  s.style.color = col;
}

async function startAR() {
  // Vérif support
  if (!navigator.xr) {
    setStatus('WebXR non supporté sur cet appareil', '#f87171');
    document.getElementById('hint').textContent = '❌ WebXR non disponible. Essayez Chrome Android ou Safari iOS 17+';
    return;
  }

  const supported = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
  if (!supported) {
    setStatus('AR non supporté', '#f87171');
    document.getElementById('hint').textContent = '❌ AR non supportée sur cet appareil';
    return;
  }

  setStatus('Démarrage AR…', '#fbbf24');

  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test', 'dom-overlay'],
      optionalFeatures: ['local-floor'],
      domOverlay: { root: document.body }
    });

    // Canvas WebGL
    canvas = document.createElement('canvas');
    canvas.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;z-index:1';
    document.body.appendChild(canvas);

    gl = canvas.getContext('webgl', { xrCompatible: true, alpha: true });
    await gl.makeXRCompatible();

    xrSession.updateRenderState({
      baseLayer: new XRWebGLLayer(xrSession, gl)
    });

    xrRefSpace = await xrSession.requestReferenceSpace('local-floor')
      .catch(() => xrSession.requestReferenceSpace('local'));

    // Hit-test depuis le centre de l'écran (viewer)
    const viewerSpace = await xrSession.requestReferenceSpace('viewer');
    hitTestSource = await xrSession.requestHitTestSource({ space: viewerSpace });

    xrSession.addEventListener('end', () => {
      xrSession = null;
      setStatus('Session AR terminée', '#94a3b8');
    });

    // Tap = placer l'objet
    xrSession.addEventListener('select', () => placeObject());

    setStatus('Surface détectée · Pointez le sol', '#34d399');
    document.getElementById('placeBtn').style.display = 'block';
    document.getElementById('hint').textContent = 'Pointez vers le sol · Bouton ou tap écran pour poser';

    xrSession.requestAnimationFrame(onXRFrame);

  } catch(e) {
    setStatus('Erreur: ' + e.message, '#f87171');
    console.error(e);
  }
}

// ═══════════════════════════
//  Rendu WebGL minimal
// ═══════════════════════════

// Shader simple
const vsSource = `
  attribute vec4 aPos;
  uniform mat4 uMVP;
  void main() { gl_Position = uMVP * aPos; }
`;
const fsSource = `
  precision mediump float;
  uniform vec4 uColor;
  void main() { gl_FragColor = uColor; }
`;

let prog = null;
let cubeVBO = null;
let cubeIBO = null;

function initGL() {
  // Compile shaders
  const vs = gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vs, vsSource); gl.compileShader(vs);
  const fs = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs, fsSource); gl.compileShader(fs);
  prog = gl.createProgram();
  gl.attachShader(prog, vs); gl.attachShader(prog, fs);
  gl.linkProgram(prog);

  // Cube vertices (0.2m de côté)
  const s = 0.1; // demi-côté
  const verts = new Float32Array([
    -s,-s,-s,  s,-s,-s,  s, s,-s, -s, s,-s, // front
    -s,-s, s,  s,-s, s,  s, s, s, -s, s, s, // back
  ]);
  cubeVBO = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, cubeVBO);
  gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);

  const idx = new Uint16Array([
    0,1,2, 0,2,3, // front
    4,5,6, 4,6,7, // back
    0,4,7, 0,7,3, // left
    1,5,6, 1,6,2, // right
    3,2,6, 3,6,7, // top
    0,1,5, 0,5,4  // bottom
  ]);
  cubeIBO = gl.createBuffer();
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, cubeIBO);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, idx, gl.STATIC_DRAW);
}

// Matrix helpers
function mat4Multiply(a, b) {
  const out = new Float32Array(16);
  for (let i = 0; i < 4; i++)
    for (let j = 0; j < 4; j++)
      for (let k = 0; k < 4; k++)
        out[i*4+j] += a[i*4+k] * b[k*4+j];
  return out;
}

function mat4RotY(angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  return new Float32Array([c,0,s,0, 0,1,0,0, -s,0,c,0, 0,0,0,1]);
}

function drawCube(projView, modelMatrix, color) {
  const mvp = mat4Multiply(projView, modelMatrix);
  gl.useProgram(prog);

  const posLoc = gl.getAttribLocation(prog, 'aPos');
  gl.bindBuffer(gl.ARRAY_BUFFER, cubeVBO);
  gl.enableVertexAttribArray(posLoc);
  gl.vertexAttribPointer(posLoc, 3, gl.FLOAT, false, 0, 0);

  const mvpLoc = gl.getUniformLocation(prog, 'uMVP');
  gl.uniformMatrix4fv(mvpLoc, false, mvp);

  const colLoc = gl.getUniformLocation(prog, 'uColor');
  gl.uniform4fv(colLoc, color);

  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, cubeIBO);
  gl.drawElements(gl.TRIANGLES, 36, gl.UNSIGNED_SHORT, 0);
}

// ═══════════════════════════
//  Frame loop
// ═══════════════════════════
let currentHitMatrix = null;

function onXRFrame(t, frame) {
  if (!frame) return;
  xrSession.requestAnimationFrame(onXRFrame);

  const glLayer = xrSession.renderState.baseLayer;
  gl.bindFramebuffer(gl.FRAMEBUFFER, glLayer.framebuffer);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.DEPTH_TEST);

  const pose = frame.getViewerPose(xrRefSpace);
  if (!pose) return;

  // Init GL une seule fois
  if (!prog) initGL();

  // Hit-test
  if (hitTestSource && !placed) {
    const hits = frame.getHitTestResults(hitTestSource);
    if (hits.length > 0) {
      const hitPose = hits[0].getPose(xrRefSpace);
      if (hitPose) {
        currentHitMatrix = hitPose.transform.matrix;
        setStatus('Sol détecté ✓', '#34d399');
      }
    } else {
      currentHitMatrix = null;
      setStatus('Cherche une surface…', '#fbbf24');
    }
  }

  for (const view of pose.views) {
    const vp = glLayer.getViewport(view);
    gl.viewport(vp.x, vp.y, vp.width, vp.height);

    // matrice projection * vue
    const proj = view.projectionMatrix;
    const viewMat = view.transform.inverse.matrix;
    const projView = mat4Multiply(proj, viewMat);

    // Reticle (indicateur de surface en cours)
    if (currentHitMatrix && !placed) {
      // Petit disque plat à l'endroit du hit
      const rm = mat4Multiply(currentHitMatrix, new Float32Array([
        0.05,0,0,0, 0,0.003,0,0, 0,0,0.05,0, 0,0,0,1
      ]));
      drawCube(projView, rm, new Float32Array([1,1,1,0.5]));
    }

    // Cube placé
    if (placed && placedMatrix) {
      objectRotY += 0.008; // rotation lente
      const rotMat = mat4RotY(objectRotY);
      const model = mat4Multiply(placedMatrix, rotMat);
      // Cube bleu
      drawCube(projView, model, new Float32Array([0.15, 0.4, 0.9, 0.92]));
      // Ombre (carré plat au sol)
      const shadowMat = mat4Multiply(placedMatrix, new Float32Array([
        0.12,0,0,0, 0,0.002,0,0, 0,0,0.12,0, 0,0,0,1
      ]));
      drawCube(projView, shadowMat, new Float32Array([0,0,0,0.3]));
    }
  }
}

// ═══════════════════════════
//  Actions
// ═══════════════════════════
function placeObject() {
  if (currentHitMatrix) {
    placedMatrix = new Float32Array(currentHitMatrix);
    placed = true;
    hitTestSource = null; // stop hit-test (économie batterie)
    setStatus('Cube posé ! Déplacez-vous autour', '#34d399');
    document.getElementById('hint').textContent = '✅ Cube ancré au sol · Déplacez-vous, il reste en place';
    document.getElementById('placeBtn').style.display = 'none';
    document.getElementById('resetBtn').style.display = 'block';
    document.getElementById('reticle').style.display = 'none';
  } else {
    setStatus('Pointez vers une surface plane', '#fbbf24');
  }
}

function resetObject() {
  placed = false;
  placedMatrix = null;
  currentHitMatrix = null;
  // Relancer hit-test
  if (xrSession && xrRefSpace) {
    xrSession.requestReferenceSpace('viewer').then(viewerSpace => {
      xrSession.requestHitTestSource({ space: viewerSpace }).then(src => {
        hitTestSource = src;
      });
    });
  }
  setStatus('Pointez vers une surface', '#fbbf24');
  document.getElementById('placeBtn').style.display = 'block';
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('reticle').style.display = 'block';
  document.getElementById('hint').textContent = 'Pointez vers le sol · Bouton ou tap pour poser';
}

// ═══════════════════════════
//  Démarrage
// ═══════════════════════════
window.addEventListener('load', () => {
  if (navigator.xr) {
    navigator.xr.isSessionSupported('immersive-ar').then(ok => {
      if (ok) {
        setStatus('AR disponible · Lancement…', '#34d399');
        startAR();
      } else {
        setStatus('AR non supportée', '#f87171');
        document.getElementById('hint').innerHTML =
          '❌ AR non supportée<br>Requiert Chrome Android avec ARCore ou Safari iOS 17+<br>Le fichier doit être servi en <b>HTTPS</b>';
      }
    });
  } else {
    setStatus('WebXR non disponible', '#f87171');
    document.getElementById('hint').innerHTML =
      '❌ WebXR non disponible<br>Ouvrez ce fichier sur <b>GitHub Pages</b> (HTTPS)<br>avec Chrome Android ou Safari iOS 17+';
  }
});
</script>
</body>
</html>
