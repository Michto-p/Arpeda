<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AR Cube v4.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#fff;font-family:sans-serif;overflow:hidden;height:100vh}
#home{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100vh;gap:20px;padding:32px;text-align:center}
h1{font-size:2rem;color:#60a5fa;font-weight:800}
p{color:rgba(255,255,255,.6);font-size:.88rem;line-height:1.8;max-width:280px}
#startBtn{padding:18px 48px;border-radius:32px;border:none;background:#2563eb;
  color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer}
#startBtn:active{transform:scale(.96)}
#hud{position:fixed;inset:0;z-index:99;pointer-events:none;display:none}
#topbar{position:absolute;top:0;left:0;right:0;padding:12px 16px;
  background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);
  display:flex;align-items:center;gap:8px;font-size:.8rem}
#status{color:#fbbf24}
#cross{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:40px;height:40px;pointer-events:none}
#cross::before,#cross::after{content:'';position:absolute;background:rgba(255,255,255,.8);border-radius:1px}
#cross::before{width:2px;height:20px;left:19px;top:10px}
#cross::after{width:20px;height:2px;left:10px;top:19px}
#hint{position:absolute;top:53%;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.65);padding:7px 16px;border-radius:18px;font-size:.75rem;white-space:nowrap}
#actions{position:absolute;bottom:28px;left:0;right:0;
  display:flex;justify-content:center;gap:10px;pointer-events:all}
.btn{padding:13px 26px;border-radius:26px;border:none;color:#fff;
  font-size:.88rem;font-weight:700;cursor:pointer;box-shadow:0 3px 14px rgba(0,0,0,.4)}
.btn:active{transform:scale(.95)}
#btnPlace{background:#2563eb}
#btnReset{background:rgba(80,80,120,.7);border:1px solid rgba(255,255,255,.2);
  font-size:.78rem;padding:10px 16px;display:none}
</style>
</head>
<body>

<div id="home">
  <h1>AR Cube · v4.0</h1>
  <p>Pointez vers le sol.<br>Tapez pour poser un cube.<br>Déplacez-vous autour — il reste ancré.</p>
  <button id="startBtn" onclick="startAR()">📷 Lancer la RA</button>
</div>

<div id="hud">
  <div id="topbar">
    <b>AR Cube v4.0</b> — <span id="status">…</span>
  </div>
  <div id="cross"></div>
  <div id="hint">Pointez vers le sol</div>
  <div id="actions">
    <button class="btn" id="btnPlace" onclick="placeObj()">📍 Poser le cube</button>
    <button class="btn" id="btnReset" onclick="resetObj()">↺ Recommencer</button>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════
//  On utilise Three.js via CDN — pas de WebGL
//  manuel. Three.js gère les matrices
//  correctement avec son propre système.
//  WebXR fournit la pose caméra, Three.js
//  dessine le cube proprement.
// ═══════════════════════════════════════════════

let ses, refSpace, hitSrc;
let placed = false;
let cubeX = 0, cubeY = 0, cubeZ = 0; // position monde ancrée
let hitX = 0,  hitY = 0,  hitZ = 0;  // surface détectée

// WebGL manuel simplifié — UN cube avec
// multiplication de matrices utilisant
// gl-matrix (librairie éprouvée)

// On charge gl-matrix depuis CDN
const script = document.createElement('script');
script.src = 'https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js';
document.head.appendChild(script);

let gl, prog, mesh;
let canvasEl;

// ── Démarrage AR ──
async function startAR() {
  if (!navigator.xr) { alert('WebXR non dispo'); return; }
  try {
    ses = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay', 'local-floor', 'anchors'],
      domOverlay: { root: document.body }
    });
  } catch(e) { alert('Erreur: ' + e.message); return; }

  document.getElementById('home').style.display = 'none';
  document.getElementById('hud').style.display  = 'block';
  setSt('Calibration…', '#fbbf24');

  ses.addEventListener('end', onEnd);
  ses.addEventListener('select', onTap);

  canvasEl = document.createElement('canvas');
  canvasEl.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;z-index:1;pointer-events:none';
  document.body.appendChild(canvasEl);

  gl = canvasEl.getContext('webgl', { xrCompatible: true, alpha: true });
  await gl.makeXRCompatible();
  ses.updateRenderState({ baseLayer: new XRWebGLLayer(ses, gl) });

  try       { refSpace = await ses.requestReferenceSpace('local-floor'); }
  catch (e) { refSpace = await ses.requestReferenceSpace('local'); }

  await startHitTest();

  // Attendre que gl-matrix soit chargé
  await waitScript();
  buildMesh();

  ses.requestAnimationFrame(loop);
}

function waitScript() {
  return new Promise(res => {
    const check = () => window.glMatrix ? res() : setTimeout(check, 50);
    check();
  });
}

async function startHitTest() {
  const vs = await ses.requestReferenceSpace('viewer');
  hitSrc = await ses.requestHitTestSource({ space: vs });
}

function onEnd() {
  document.getElementById('home').style.display = 'flex';
  document.getElementById('hud').style.display  = 'none';
  placed = false;
  if (canvasEl) canvasEl.remove();
}

function onTap() { placeObj(); }

function placeObj() {
  if (!hitSrc) return;
  cubeX = hitX; cubeY = hitY; cubeZ = hitZ;
  placed = true;
  // Stop hit-test
  try { hitSrc.cancel(); } catch {}
  hitSrc = null;
  setSt('Cube ancré ✓ Bougez-vous !', '#34d399');
  document.getElementById('hint').style.display = 'none';
  hide('btnPlace'); show('btnReset');
}

function resetObj() {
  placed = false;
  startHitTest();
  setSt('Pointez le sol…', '#fbbf24');
  document.getElementById('hint').style.display = 'block';
  show('btnPlace'); hide('btnReset');
}

// ═══════════════════════════════════════════════
//  Mesh WebGL avec gl-matrix
// ═══════════════════════════════════════════════
function buildMesh() {
  const { vec3, mat4 } = glMatrix;

  const vsrc = `
    attribute vec3 aPos;
    attribute vec3 aCol;
    attribute vec3 aNorm;
    uniform mat4 uProj;
    uniform mat4 uView;
    uniform mat4 uModel;
    varying vec3 vCol;
    varying vec3 vNorm;
    void main(){
      gl_Position = uProj * uView * uModel * vec4(aPos,1.0);
      vNorm = normalize(vec3(uModel * vec4(aNorm,0.0)));
      vCol  = aCol;
    }`;

  const fsrc = `
    precision mediump float;
    varying vec3 vCol;
    varying vec3 vNorm;
    void main(){
      float d = max(dot(vNorm, normalize(vec3(1.0,2.0,1.0))), 0.0);
      gl_FragColor = vec4(vCol * (0.4 + 0.6*d), 1.0);
    }`;

  const vs = gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vs, vsrc); gl.compileShader(vs);
  const fs = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs, fsrc); gl.compileShader(fs);
  prog = gl.createProgram();
  gl.attachShader(prog, vs); gl.attachShader(prog, fs);
  gl.linkProgram(prog);

  const s = 0.10; // cube 20cm

  // Données : pos(3) + col(3) + norm(3) par vertex
  // 6 faces × 4 vertex = 24 vertex
  const D = [
    // face, normale, couleur
    [[[-s,-s, s],[s,-s, s],[s,s, s],[-s,s, s]], [0,0,1],  [0.3,0.6,1.0]], // front  bleu
    [[[s,-s,-s],[-s,-s,-s],[-s,s,-s],[s,s,-s]], [0,0,-1], [0.2,0.4,0.9]], // back
    [[[s,-s, s],[s,-s,-s],[s,s,-s],[s,s, s]],   [1,0,0],  [0.2,0.7,0.9]], // right  cyan
    [[[-s,-s,-s],[-s,-s,s],[-s,s,s],[-s,s,-s]],[-1,0,0], [0.2,0.5,0.9]], // left
    [[[-s,s, s],[s,s, s],[s,s,-s],[-s,s,-s]],   [0,1,0],  [0.8,0.9,1.0]], // top    blanc
    [[[-s,-s,-s],[s,-s,-s],[s,-s,s],[-s,-s,s]], [0,-1,0], [0.1,0.3,0.6]], // bottom foncé
  ];

  const verts = [], idx = [];
  D.forEach(([vs, n, c], fi) => {
    const b = fi * 4;
    vs.forEach(p => verts.push(...p, ...c, ...n));
    idx.push(b,b+1,b+2, b,b+2,b+3);
  });

  mesh = {};
  mesh.vbo = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, mesh.vbo);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(verts), gl.STATIC_DRAW);
  mesh.ibo = gl.createBuffer();
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, mesh.ibo);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(idx), gl.STATIC_DRAW);
  mesh.count = idx.length;

  // Réticule
  const rv = [], ri = [];
  rv.push(0,0,0, 1,1,1, 0,1,0);
  for (let i=0; i<32; i++) {
    const a = i/32*Math.PI*2;
    rv.push(Math.cos(a)*0.07,0,Math.sin(a)*0.07, 1,1,1, 0,1,0);
    ri.push(0, i+1, (i+1)%32+1);
  }
  mesh.rVbo = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, mesh.rVbo);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(rv), gl.STATIC_DRAW);
  mesh.rIbo = gl.createBuffer();
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, mesh.rIbo);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(ri), gl.STATIC_DRAW);
  mesh.rCount = ri.length;
}

// ── Draw ──
let rotY = 0;

function draw(proj, view, model, vbo, ibo, count) {
  const stride = 9 * 4;
  gl.useProgram(prog);
  gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);

  [['aPos',3,0],['aCol',3,3],['aNorm',3,6]].forEach(([n,s,o])=>{
    const l = gl.getAttribLocation(prog,n);
    if(l<0) return;
    gl.enableVertexAttribArray(l);
    gl.vertexAttribPointer(l,s,gl.FLOAT,false,stride,o*4);
  });

  gl.uniformMatrix4fv(gl.getUniformLocation(prog,'uProj'),  false, proj);
  gl.uniformMatrix4fv(gl.getUniformLocation(prog,'uView'),  false, view);
  gl.uniformMatrix4fv(gl.getUniformLocation(prog,'uModel'), false, model);
  gl.drawElements(gl.TRIANGLES, count, gl.UNSIGNED_SHORT, 0);
}

// ═══════════════════════════════════════════════
//  Boucle — utilise gl-matrix pour les matrices
// ═══════════════════════════════════════════════
function loop(t, frame) {
  ses.requestAnimationFrame(loop);
  if (!window.glMatrix || !prog) return;

  const { mat4 } = glMatrix;
  const layer = ses.renderState.baseLayer;
  gl.bindFramebuffer(gl.FRAMEBUFFER, layer.framebuffer);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.DEPTH_TEST);

  const pose = frame.getViewerPose(refSpace);
  if (!pose) return;

  // Hit-test
  if (hitSrc) {
    const hits = frame.getHitTestResults(hitSrc);
    if (hits.length > 0) {
      const hp = hits[0].getPose(refSpace);
      if (hp) {
        // Extraire position depuis la matrice (colonnes 12,13,14)
        hitX = hp.transform.matrix[12];
        hitY = hp.transform.matrix[13];
        hitZ = hp.transform.matrix[14];
        setSt('Surface ✓ Tapez pour poser', '#34d399');
      }
    } else {
      setSt('Cherche une surface…', '#fbbf24');
    }
  }

  for (const view of pose.views) {
    const vp = layer.getViewport(view);
    gl.viewport(vp.x, vp.y, vp.width, vp.height);

    const proj = view.projectionMatrix;
    const viewM = view.transform.inverse.matrix;

    // Réticule
    if (hitSrc && !placed) {
      const m = mat4.create();
      mat4.fromTranslation(m, [hitX, hitY, hitZ]);
      draw(proj, viewM, m, mesh.rVbo, mesh.rIbo, mesh.rCount);
    }

    // Cube
    if (placed) {
      rotY += 0.008;
      // Matrice modèle = translation + lift + rotation
      // mat4.create() donne une matrice identité propre
      const m = mat4.create();
      mat4.translate(m, m, [cubeX, cubeY + 0.10, cubeZ]);
      mat4.rotateY(m, m, rotY);
      draw(proj, viewM, m, mesh.vbo, mesh.ibo, mesh.count);

      // Ombre
      const s = mat4.create();
      mat4.translate(s, s, [cubeX, cubeY + 0.001, cubeZ]);
      mat4.scale(s, s, [0.14, 0.001, 0.14]);
      draw(proj, viewM, s, mesh.vbo, mesh.ibo, mesh.count);
    }
  }
}

function setSt(t,c){ const s=document.getElementById('status'); s.textContent=t; s.style.color=c||'#fff'; }
function show(id){ document.getElementById(id).style.display='block'; }
function hide(id){ document.getElementById(id).style.display='none'; }
</script>
</body>
</html>
